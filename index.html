<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shared Workspace Logging</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f7f6;
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --text-main: #1F2937;
            --text-muted: #6B7280;
            --card-bg: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            min-height: 100vh;
            margin: 0;
            padding: 2rem;
            color: var(--text-main);
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            width: 100%;
            max-width: 600px;
            margin-top: 2rem;
        }

        /* Dynamic Toggle Switch */
        .toggle-wrapper {
            display: flex;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 0.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .toggle-btn {
            flex: 1;
            padding: 1rem;
            border: none;
            background: transparent;
            font-weight: 600;
            font-size: 1rem;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .toggle-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 10px rgba(79, 70, 229, 0.3);
        }

        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* View Switching Animation */
        .view {
            display: none;
            animation: fadeSlideIn 0.4s ease forwards;
        }

        .view.active {
            display: block;
        }

        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { margin-top: 0; color: var(--primary); font-weight: 600; }
        
        .form-group { margin-bottom: 1.5rem; }
        
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input, select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #D1D5DB;
            border-radius: 8px;
            font-family: inherit;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .submit-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 1rem;
            width: 100%;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
        }

        .submit-btn:hover { background-color: var(--primary-hover); }
        .submit-btn:active { transform: scale(0.98); }

        /* Timeline / Events UI */
        .timeline {
            position: relative;
            padding-left: 20px;
            margin-top: 1rem;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #E5E7EB;
        }

        .event-card {
            background: #f9fafb;
            border: 1px solid #E5E7EB;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            position: relative;
            opacity: 0;
            transform: translateX(-10px);
            animation: slideRight 0.4s ease forwards;
        }

        .event-card::before {
            content: '';
            position: absolute;
            left: -26px;
            top: 24px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--primary);
            border: 3px solid white;
        }

        .event-time {
            font-size: 0.85rem;
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 0.5rem;
            line-height: 1.4;
        }

        .event-title { font-weight: 600; font-size: 1.1rem; margin: 0 0 0.5rem 0; }
        .event-details { font-size: 0.9rem; color: var(--text-muted); margin: 0; }

        .loader { text-align: center; color: var(--text-muted); font-style: italic; padding: 2rem 0; }

        #messageBox {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 8px;
            display: none;
            text-align: center;
            animation: fadeSlideIn 0.3s ease;
        }

        .success { background: #D1FAE5; color: #065F46; border: 1px solid #A7F3D0; }
        .error { background: #FEE2E2; color: #991B1B; border: 1px solid #FECACA; }

        @keyframes slideRight {
            to { opacity: 1; transform: translateX(0); }
        }

        @media (max-width: 768px) {
            body { padding: 1rem; }
            .glass-panel { padding: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="container">
    
    <div class="toggle-wrapper">
        <button class="toggle-btn active" id="btnBook" onclick="switchView('book')">Log Event</button>
        <button class="toggle-btn" id="btnSchedule" onclick="switchView('schedule')">Show Schedule</button>
    </div>

    <div id="bookView" class="glass-panel view active">
        <h2>Book the Workspace</h2>
        <form id="bookingForm">
            <div class="form-group">
                <label for="name">Your Name</label>
                <input type="text" id="name" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label for="company">Company</label>
                <input type="text" id="company" required placeholder="Company A">
            </div>
            <div class="form-group">
                <label for="purpose">Purpose of Use</label>
                <input type="text" id="purpose" required placeholder="Client Meeting, Brainstorming, etc.">
            </div>
            <div class="form-group">
                <label for="date">Date</label>
                <input type="text" id="date" required placeholder="Select Date">
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label for="startTime">Start Time</label>
                    <input type="text" id="startTime" required placeholder="00:00">
                </div>
                <div class="form-group">
                    <label for="endTime">End Time</label>
                    <input type="text" id="endTime" required placeholder="00:00">
                </div>
            </div>
            <button type="submit" id="submitBtn" class="submit-btn">Reserve Space</button>
        </form>
        <div id="messageBox"></div>
    </div>

    <div id="scheduleView" class="glass-panel view">
        <h2>Upcoming Schedule</h2>
        <div id="eventsLoader" class="loader">Fetching schedule...</div>
        <div class="timeline" id="eventsTimeline">
            </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
    // --- PASTE YOUR WORKING WEB APP URL HERE ---
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyekQjxKHmWbrBE1HAzBjKMhGY1Rd0B3WtoTyUqRlA-ze5QyrDpjoEupLi4oDBWfDOc/exec';

    // UI View Switcher Logic
    function switchView(viewName) {
        document.getElementById('bookView').classList.remove('active');
        document.getElementById('scheduleView').classList.remove('active');
        document.getElementById('btnBook').classList.remove('active');
        document.getElementById('btnSchedule').classList.remove('active');

        if(viewName === 'book') {
            document.getElementById('bookView').classList.add('active');
            document.getElementById('btnBook').classList.add('active');
        } else {
            document.getElementById('scheduleView').classList.add('active');
            document.getElementById('btnSchedule').classList.add('active');
            loadEvents(); 
        }
    }

    // Initialize Pickers
    flatpickr("#date", { minDate: "today", dateFormat: "Y-m-d" });
    flatpickr("#startTime", { enableTime: true, noCalendar: true, dateFormat: "H:i", time_24hr: false });
    flatpickr("#endTime", { enableTime: true, noCalendar: true, dateFormat: "H:i", time_24hr: false });

    // FORMATTING FUNCTION: Solves the Time Zone Offset Bug
    function formatBeautifulDate(dateStr, startStr, endStr) {
        try {
            // Let the browser handle the UTC to Local conversion natively
            const temp = new Date(dateStr);
            const yyyy = temp.getFullYear();
            const mm = temp.getMonth() + 1;
            const dd = temp.getDate();
            
            // Rebuild a clean date object strictly for getting the weekday
            const cleanDate = new Date(yyyy, mm - 1, dd, 12, 0, 0);
            const dayName = cleanDate.toLocaleDateString('en-GB', { weekday: 'long' });
            
            // Format strictly as DD/MM/YYYY
            const formattedDateStr = `${dd}/${mm}/${yyyy}`;

            // Format the Time to AM/PM
            function parseTime(t) {
                if (!t) return "TBD";
                if (typeof t === 'string' && t.includes('T')) {
                    return new Date(t).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
                } else {
                    let [h, m] = t.toString().split(':');
                    let timeObj = new Date();
                    timeObj.setHours(parseInt(h, 10), parseInt(m, 10));
                    return timeObj.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
                }
            }

            return `${dayName}, ${formattedDateStr}, from ${parseTime(startStr)} to ${parseTime(endStr)}`;
        } catch (e) {
            return "Date formatting error"; 
        }
    }

    // Fetch and display events
    async function loadEvents() {
        const timeline = document.getElementById('eventsTimeline');
        const loader = document.getElementById('eventsLoader');
        
        loader.style.display = 'block';
        timeline.innerHTML = ''; 

        try {
            const response = await fetch(GOOGLE_SCRIPT_URL);
            const events = await response.json();
            
            loader.style.display = 'none';

            // Get midnight today to safely filter out past events
            const now = new Date();
            const todayMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0).getTime();

            const upcomingEvents = events.filter(e => {
                if(!e.date) return false;
                
                // Allow browser to parse the timezone naturally to prevent shifting dates
                const temp = new Date(e.date);
                const eventTime = new Date(temp.getFullYear(), temp.getMonth(), temp.getDate(), 0, 0, 0).getTime();
                
                return eventTime >= todayMidnight; 
            });

            // Sort chronologically (Date first, then Start Time)
            upcomingEvents.sort((a, b) => {
                const tempA = new Date(a.date);
                const dateA = new Date(tempA.getFullYear(), tempA.getMonth(), tempA.getDate()).getTime();
                
                const tempB = new Date(b.date);
                const dateB = new Date(tempB.getFullYear(), tempB.getMonth(), tempB.getDate()).getTime();

                if (dateA !== dateB) return dateA - dateB;
                return a.startTime.localeCompare(b.startTime);
            });

            if(upcomingEvents.length === 0) {
                timeline.innerHTML = '<div class="loader">No upcoming bookings. The space is completely open!</div>';
                return;
            }

            upcomingEvents.forEach((event, index) => {
                const delay = index * 0.1; 
                const beautifulTimeString = formatBeautifulDate(event.date, event.startTime, event.endTime);

                const html = `
                    <div class="event-card" style="animation-delay: ${delay}s">
                        <div class="event-time">${beautifulTimeString}</div>
                        <h3 class="event-title">${event.purpose}</h3>
                        <p class="event-details"><strong>${event.name}</strong> • ${event.company}</p>
                    </div>
                `;
                timeline.insertAdjacentHTML('beforeend', html);
            });
        } catch (error) {
            loader.innerText = 'Unable to load schedule. Ensure your Script URL is correct.';
        }
    }

    // Handle Form Submission
    document.getElementById('bookingForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const btn = document.getElementById('submitBtn');
        const msgBox = document.getElementById('messageBox');
        
        btn.innerText = 'Processing...';
        btn.disabled = true;
        msgBox.style.display = 'none';

        const params = new URLSearchParams({
            action: 'save',
            name: document.getElementById('name').value,
            company: document.getElementById('company').value,
            purpose: document.getElementById('purpose').value,
            date: document.getElementById('date').value,
            startTime: document.getElementById('startTime').value,
            endTime: document.getElementById('endTime').value
        });

        const requestUrl = `${GOOGLE_SCRIPT_URL}?${params.toString()}`;

        try {
            const response = await fetch(requestUrl);
            const result = await response.json();
            
            msgBox.style.display = 'block';
            if(result.status === 'success') {
                msgBox.className = 'success';
                msgBox.innerText = 'Workspace booked successfully!';
                document.getElementById('bookingForm').reset();
                
                setTimeout(() => {
                    msgBox.style.display = 'none';
                    switchView('schedule');
                }, 1500);

            } else {
                msgBox.className = 'error';
                msgBox.innerText = result.message; 
            }
        } catch (error) {
            msgBox.style.display = 'block';
            msgBox.className = 'error';
            msgBox.innerText = 'Network error. Please try again.';
        }

        btn.innerText = 'Reserve Space';
        btn.disabled = false;
    });
</script>

</body>
</html>
